<style>
    /* Custom Grid for the Business Card Interface */
    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        width: 100%;
        max-width: 1000px;
        margin-top: 20px;
    }

    .project-card {
        /* Inherits from your .footer-block, with added hover effects */
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        justify-content: space-between;
    }

    .project-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.8);
        border-color: #555;
    }

    .project-card h2 {
        margin: 0 0 10px 0;
        color: #fff;
        font-size: 20px;
    }

    .project-card p {
        color: #ccc;
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 20px 0;
    }
</style>
